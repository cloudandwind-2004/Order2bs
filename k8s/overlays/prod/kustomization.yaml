apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lunchorder

resources:
  - ../../base

# Override cho production
patches:
  # Scale down để phù hợp Minikube (6GB RAM)
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: backend
  # Scale up frontend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: frontend
  # Tăng resource limits cho production DB
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
    target:
      kind: StatefulSet
      name: postgres
  # Tăng PVC DB cho production
  - patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: "50Gi"
    target:
      kind: PersistentVolumeClaim
      name: postgres-pvc

# Image tags (dùng latest vì đã load vào Minikube)
images:
  - name: ghcr.io/anab821/lunchorder-backend
    newTag: latest
  - name: ghcr.io/anab821/lunchorder-frontend
    newTag: latest
