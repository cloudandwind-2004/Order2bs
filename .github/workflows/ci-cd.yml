name: 🚀 CI — Build, Push & Update GitOps

on:
  push:
    branches:
      - main        # → update prod overlay → ArgoCD auto-sync prod
      - develop     # → update dev overlay  → ArgoCD auto-sync dev
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/lunchorder-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/lunchorder-frontend

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build & Push (chạy khi push)
  # ─────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag (short SHA)
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Job 2: Update Git (GitOps — ArgoCD sẽ pick up)
  # ─────────────────────────────────────────
  update-gitops:
    name: Update Image Tag in Git (GitOps)
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: write   # Cần write để push commit cập nhật tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Determine overlay từ branch
        id: overlay
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "dir=k8s/overlays/prod" >> $GITHUB_OUTPUT
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "dir=k8s/overlays/dev" >> $GITHUB_OUTPUT
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Update image tag trong Kustomize overlay
        run: |
          TAG=${{ needs.build-push.outputs.image-tag }}
          DIR=${{ steps.overlay.outputs.dir }}

          cd $DIR
          kustomize edit set image \
            ${{ env.BACKEND_IMAGE }}=${{ env.BACKEND_IMAGE }}:${TAG} \
            ${{ env.FRONTEND_IMAGE }}=${{ env.FRONTEND_IMAGE }}:${TAG}
          cd ../../..

          echo "Updated $DIR to use tag: $TAG"
          cat $DIR/kustomization.yaml

      - name: Commit & Push tag update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/
          git diff --staged --quiet || git commit -m "ci: update image tag to ${{ needs.build-push.outputs.image-tag }} [${{ steps.overlay.outputs.env }}]"
          git push

      # ArgoCD sẽ tự detect commit mới và sync cluster
      # Không cần kubectl ở đây nữa!

  # ─────────────────────────────────────────
  # Job 3: Notify ArgoCD sync (optional speedup)
  # Nếu không config, ArgoCD vẫn tự sync sau ~3 phút
  # ─────────────────────────────────────────
  notify-argocd:
    name: Trigger ArgoCD Sync (optional)
    runs-on: ubuntu-latest
    needs: update-gitops
    if: github.ref == 'refs/heads/main'
    continue-on-error: true   # Không fail pipeline nếu ArgoCD chưa setup

    steps:
      - name: Trigger ArgoCD App Sync
        run: |
          # Nếu đã expose ArgoCD API, uncomment và điền ARGOCD_SERVER
          # argocd app sync lunchorder-prod \
          #   --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
          #   --server ${{ secrets.ARGOCD_SERVER }} \
          #   --insecure
          echo "ArgoCD sẽ tự động detect commit mới và sync trong ~3 phút"
          echo "Hoặc vào ArgoCD UI để sync thủ công ngay"
