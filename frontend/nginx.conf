server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Kubernetes DNS resolver ────────────────────────────────────────────
    # Dùng biến cho proxy_pass để tránh nginx crash khi backend chưa lên
    resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

    # ── SPA React Router ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API → backend (per-request DNS resolution) ──────────────────
    location /api/ {
        set $api_backend http://backend-svc:8080;
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────
    location /ws {
        set $ws_backend http://backend-svc:8080;
        proxy_pass $ws_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── File uploads ──────────────────────────────────────────────────────
    location /uploads/ {
        set $upload_backend http://backend-svc:8080;
        proxy_pass $upload_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
}
