apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  APP_ENV: "production"
  DB_HOST: "{{ .Release.Name }}-postgres"
  DB_PORT: "5432"
  DB_NAME: "lunchorder"
  DB_USER: "postgres"
  VITE_API_URL: "https://{{ .Values.ingress.host }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
data:
  # Base64 encoded values (placeholders)
  DB_PASSWORD: {{ "postgres" | b64enc | quote }}
  JWT_SECRET: {{ "supersecret" | b64enc | quote }}
